<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackIT — Stazione</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- CSS propri -->
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<!-- CSS specifico pagina -->
<link rel="stylesheet" href="css/stazione.css">
<link rel="stylesheet" href="css/map.css">
<!-- Theme script — caricato PRIMA del body per evitare FOUC -->
<script src="js/theme.js"></script>
</head>
<body>
<header class="site-header">
<div class="container">
<a href="index.html" class="logo">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2c-4.418 0-8 3.582-8 8 0 6 8 12 8 12s8-6 8-12c0-4.418-3.582-8-8-8zm0 11c-1.657 0-3-1.343-3-3s1.343-3 3-3 3 1.343 3 3-1.343 3-3 3z"></path></svg>
<span>TrackIT</span>
</a>
<nav class="main-nav">
<a href="index.html" data-i18n="nav.home">Home</a>
<button id="theme-toggle" class="btn-theme-toggle" aria-label="Passa a modalità scura">
  <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/></svg>
  <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<a href="news.html" data-i18n="nav.news">News</a>
<button id="lang-toggle" class="btn-lang">IT</button>
</nav>
<button class="hamburger" aria-label="Menu">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
</button>
</div>
</header>
<main>
<div class="container">
<section class="station-header">
<h1 id="station-name">Nome Stazione</h1>
<div id="station-meteo-container"></div>
<p id="last-update-time" class="update-info"></p>
<div class="tabs">
<button class="tab-button active" data-tab="partenze" data-i18n="station.departures">Partenze</button>
<button class="tab-button" data-tab="arrivi" data-i18n="station.arrivals">Arrivi</button>
</div>
<div class="delay-threshold-config">
<span data-i18n="station.alert_threshold">Avvisa se ritardo ></span>
<input type="number" id="delay-threshold-input" value="5" min="0">
<span data-i18n="station.min">min</span>
</div>
<button id="refresh-button" class="btn btn-secondary" data-i18n="general.refresh">Aggiorna</button>
</section>

<section class="station-content">
<div class="train-list-container">
<div id="loader-train-list" class="loader"></div>
<table class="table-orari" id="train-table">
<thead>
<tr>
<th><span data-i18n="station.train">Treno</span></th>
<th><span id="th-locality" data-i18n="station.destination">Destinazione</span></th>
<th><span data-i18n="station.scheduled_time">Orario Previsto</span></th>
<th><span data-i18n="station.delay">Ritardo</span></th>
<th><span data-i18n="station.status">Stato</span></th>
</tr>
</thead>
<tbody>
<!-- Dati treni verranno caricati qui -->
</tbody>
</table>
<p id="no-trains-message" style="display: none;" data-i18n="station.no_results"></p>
<div id="show-more-container" style="display:none; text-align:center; margin-top: var(--space-2);">
  <button id="show-more-btn" class="btn btn-secondary">Mostra di più</button>
</div>
</div>
<div class="map-container" id="station-map"></div>
</section>
</div>
</main>
<footer class="site-footer">
<div class="container">
<p data-i18n="footer.credit">TrackIT — Dati da Trenitalia/Viaggiatreno</p>
</div>
</footer>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Script pagina -->
<script type="module" src="js/stazione.js"></script>
</body>
</html>
