</button>
<a href="news.html" data-i18n="nav.news">News</a>
<button id="lang-toggle" class="btn-lang">IT</button>
</nav>
<button class="hamburger" aria-label="Menu">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
</button>
</div>
</header>
<main>
<div class="container">
<section class="train-header">
<h1 id="train-number-display">Treno #<span id="train-number"></span></h1>
<div class="train-info">
<span id="train-origin" data-i18n="general.origin">Origine</span>: <span id="train-origin-name"></span>
<span id="train-destination" data-i18n="general.destination">Destinazione</span>: <span id="train-destination-name"></span>
<span id="train-current-delay" data-i18n="general.current_delay">Ritardo attuale</span>: <span id="current-delay-value"></span>
</div>
<p id="last-update-time" class="update-info"></p>
<button id="refresh-button" class="btn btn-secondary" data-i18n="general.refresh">Aggiorna</button>
</section>

<section class="train-detail-layout">
<div class="train-timeline-container">
<h2 data-i18n="general.stops">Fermate</h2>
<div id="loader-timeline" class="loader"></div>
<div id="train-timeline" class="train-timeline">
<!-- Timeline delle fermate verrà caricata qui -->
</div>
</div>
<div class="map-container" id="train-map"></div>
</section>
</div>
</main>
<footer class="site-footer">
<div class="container">
<p data-i18n="footer.credit">TrackIT — Dati da Trenitalia/Viaggiatreno</p>
</div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
